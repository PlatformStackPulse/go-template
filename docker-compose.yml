version: "3.9"

services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-template-dev
    volumes:
      - .:/app
      - /app/bin
    working_dir: /app
    environment:
      - DEBUG=true
    command: go run cmd/app/main.go hello

  test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-template-test
    volumes:
      - .:/app
    working_dir: /app
    command: go test -v -race ./...

  lint:
    image: golangci/golangci-lint:latest
    container_name: go-template-lint
    volumes:
      - .:/app
    working_dir: /app
    command: golangci-lint run ./...
