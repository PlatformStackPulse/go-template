style: github
template: CHANGELOG.tpl.md
info:
  title: CHANGELOG
  repository_url: https://github.com/PlatformStackPulse/go-template
options:
  commits:
    filters:
      Type:
        - feat
        - fix
        - perf
        - refactor
        - docs
        - chore
        - ci
        - build
        - test
  commit_groups:
    title_maps:
      feat: Features
      fix: Bug Fixes
      perf: Performance Improvements
      refactor: Refactoring
      docs: Documentation
      chore: Chores
      ci: CI
      build: Build
      test: Tests
  header:
    pattern: '^(\w*)(?:\((.*)\))?!?:\s(.*)$'
    pattern_maps:
      - Type
      - Scope
      - Subject
